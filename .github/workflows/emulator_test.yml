name: Android Emulator CI with Random Device Profile
 
on:
  push:
    branches: [ "main" ] 
  pull_request: 
    branches: [ "main" ] 
  workflow_dispatch: 

jobs:  
  emulator-video: 
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up JDK 17 
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK 
        uses: android-actions/setup-android@v3

      - name: Pick random supported device
        id: pick-device
        run: |
          devices=("pixel" "pixel_2" "pixel_2_xl" "pixel_3" "pixel_3_xl" "pixel_3a" "pixel_4" "pixel_4_xl" "pixel_5" "pixel_6" "pixel_6_pro" "pixel_7" "pixel_7_pro" "nexus_5x" "nexus_6p")
          random_device=${devices[$RANDOM % ${#devices[@]}]}
          echo "device=$random_device" >> $GITHUB_OUTPUT
          echo "Selected device: $random_device"

      - name: Enable KVM group perms
        run: | 
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm || true

      - name: Launch emulator and run script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel
          avd-name: test
          force-avd-creation: true
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: "-no-window -gpu swiftshader_indirect"
          script: |
            adb wait-for-device

            # تنزيل فايرفوكس APK من موقع رسمي (Mozilla direct link أو APKMirror)
            wget -O firefox.apk "https://download.mozilla.org/?product=fennec-latest&os=android&lang=en-US"

            # تثبيت فايرفوكس
            adb install firefox.apk

            # لقطة شاشة بعد التثبيت
            adb exec-out screencap -p > screenshot_install.png
            sleep 10
            adb exec-out screencap -p > screenshot_installed.png

            # تشغيل فايرفوكس على الموقع المطلوب بوضع المكتب + UA مخصص
            adb shell am start -a android.intent.action.VIEW -d "https://viscend.vercel.app/" -n org.mozilla.firefox/org.mozilla.gecko.BrowserApp --ez desktop_mode true --es useragent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"

            # انتظار تحميل الصفحة
            sleep 8
            
            # قبول الشروط
            adb shell input tap 543 1704
            adb shell input tap 543 1754
            adb shell input tap 543 1654
            adb shell input tap 543 1840

            sleep 2

            adb shell input tap 145 1695
            adb shell input tap 155 1710

            # لقطة شاشة بعد الفتح
            adb exec-out screencap -p > screenshot_open.png

            # تمرير الصفحة
            adb shell input swipe 500 1500 500 200
            sleep 3
            adb exec-out screencap -p > screenshot_scroll.png

            # حفظ snapshot للمخرجات
            adb emu avd snapshot save firefox_run

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: firefox-screenshots
          path: |
            screenshot_install.png
            screenshot_installed.png
            screenshot_open.png
            screenshot_scroll.png

      - name: Upload emulator snapshot
        uses: actions/upload-artifact@v4
        with:
          name: firefox-snapshot
          path: ~/.android/avd/test.avd/snapshots
