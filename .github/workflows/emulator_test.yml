name: Android Emulator Test with Video and Screenshot
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. إعداد بيئة Java وAndroid SDK
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      # 2. تثبيت نظام Android وتحديث PATH
      - name: Install Android System Image and Tools
        run: |
          echo "y" | sdkmanager "system-images;android-30;google_apis;x86" > /dev/null
          echo "y" | sdkmanager "emulator" > /dev/null
          echo "y" | sdkmanager "platform-tools" > /dev/null

      # 3. إنشاء AVD وتشغيل المحاكي
      - name: Create AVD and Start Emulator
        run: |
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-30;google_apis;x86" -d pixel_5 --force
          $ANDROID_HOME/emulator/emulator -avd test_device -no-window -camera-back none -camera-front none -memory 2048 -noaudio -no-snapstorage -accel off -gpu swiftshader_indirect -no-boot-anim &
          $ANDROID_HOME/platform-tools/adb wait-for-device
          sleep 90

      # 4. تسجيل فيديو للشاشة لمدة 60 ثانية
      - name: Record Screen
        run: |
          $ANDROID_HOME/platform-tools/adb shell screenrecord /sdcard/emulator_record.mp4 --time-limit 60 &
          RECORD_PID=$!
          echo "RECORD_PID=$RECORD_PID" >> $GITHUB_ENV

      # 5. فتح المتصفح الافتراضي والتقاط صورة
      - name: Open Browser and Take Screenshot
        run: |
          $ANDROID_HOME/platform-tools/adb shell am start -a android.intent.action.VIEW -d https://www.google.com
          sleep 10
          $ANDROID_HOME/platform-tools/adb shell screencap -p /sdcard/screenshot.png

      # 6. التقاط قائمة التطبيقات وحفظها
      - name: Save Installed Apps List
        run: |
          $ANDROID_HOME/platform-tools/adb shell pm list packages > packages_list.txt

      # 7. تنفيذ أوامر التمرير والتنقل
      - name: Perform Swipe and Navigation Actions
        run: |
          $ANDROID_HOME/platform-tools/adb shell input swipe 500 1000 100 1000 200
          sleep 2
          $ANDROID_HOME/platform-tools/adb shell input swipe 100 1000 500 1000 200
          sleep 2
          $ANDROID_HOME/platform-tools/adb shell input keyevent 3
          sleep 2
          $ANDROID_HOME/platform-tools/adb shell input swipe 500 0 500 1000 500

      # 8. إيقاف تسجيل الشاشة
      - name: Stop Screen Recording
        run: |
          $ANDROID_HOME/platform-tools/adb shell kill $RECORD_PID || true
          $ANDROID_HOME/platform-tools/adb pull /sdcard/emulator_record.mp4 .
          $ANDROID_HOME/platform-tools/adb pull /sdcard/screenshot.png .

      # 9. إغلاق المحاكي
      - name: Stop Emulator
        run: $ANDROID_HOME/platform-tools/adb emu kill

      # 10. حفظ المخرجات في Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Emulator-Outputs
          path: |
            emulator_record.mp4
            screenshot.png
            packages_list.txt
