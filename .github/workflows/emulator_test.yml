name: Android Emulator Test with Video and Screenshot

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. إعداد بيئة Java وAndroid SDK
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      # 2. إنشاء AVD وتشغيل المحاكي
      - name: Create AVD and Start Emulator
        run: |
          sdkmanager "system-images;android-33;google_apis;x86_64"
          avdmanager create avd -n test_device -k "system-images;android-33;google_apis;x86_64" -d pixel_5 --force
          emulator -avd test_device -no-window -camera-back none -camera-front none -memory 2048 &
          adb wait-for-device
          adb shell input keyevent 82  # فتح الشاشة

      # 3. تسجيل فيديو للشاشة لمدة 60 ثانية
      - name: Record Screen
        run: |
          adb shell screenrecord /sdcard/emulator_record.mp4 --time-limit 60 &
          sleep 60  # انتظار 60 ثانية لتسجيل الفيديو
          adb pull /sdcard/emulator_record.mp4 .

      # 4. فتح المتصفح الافتراضي
      - name: Open Browser and Take Screenshot
        run: |
          adb shell am start -n com.android.browser/.BrowserActivity
          sleep 5  # انتظار فتح المتصفح
          adb shell screencap -p /sdcard/screenshot.png
          adb pull /sdcard/screenshot.png .

      # 5. التقاط قائمة التطبيقات وحفظها
      - name: Save Installed Apps List
        run: |
          adb shell pm list packages > packages_list.txt

      # 6. تنفيذ أوامر تمرير (مثل التمرير بين الصفحات)
      - name: Perform Swipe and Navigation Actions
        run: |
          # تمرير لليسار
          adb shell input swipe 500 1000 100 1000 200
          sleep 2
          # تمرير لليمين
          adb shell input swipe 100 1000 500 1000 200
          sleep 2
          # فتح قائمة التطبيقات
          adb shell input keyevent 3  # زر "Home"
          sleep 2
          # فتح قائمة الإشعارات
          adb shell input swipe 500 0 500 1000 500

      # 7. إغلاق المحاكي
      - name: Stop Emulator
        run: adb emu kill

      # 8. حفظ المخرجات في Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Emulator-Outputs
          path: |
            emulator_record.mp4
            screenshot.png
            packages_list.txt
