name: Android Emulator Test with Video and Screenshot
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install Android System Image and Tools
        run: |
          echo "y" | sdkmanager --verbose "system-images;android-30;google_apis;x86" > /dev/null
          echo "y" | sdkmanager --verbose "emulator" > /dev/null
          echo "y" | sdkmanager --verbose "platform-tools" > /dev/null

      - name: Create AVD and Start Emulator
        run: |
          Xvfb :99 -screen 0 1024x768 16 &
          export DISPLAY=:99
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-30;google_apis;x86" -d pixel_5 --force
          $ANDROID_HOME/emulator/emulator -avd test_device -no-snapshot -memory 2048 -noaudio -no-snapstorage -accel off -gpu swiftshader_indirect -no-boot-anim -writable-system &
          $ANDROID_HOME/platform-tools/adb wait-for-device
          sleep 300

      - name: Check Boot Status
        run: |
          timeout 300 bash -c '
          until $ANDROID_HOME/platform-tools/adb shell dumpsys window | grep "mCurrentFocus"; do
            sleep 10
          done
          '

      - name: Start Screen Recording
        run: |
          $ANDROID_HOME/platform-tools/adb shell screenrecord /sdcard/emulator_record.mp4 &
          RECORD_PID=$!
          echo "RECORD_PID=$RECORD_PID" >> $GITHUB_ENV

      - name: Perform Swipe and Navigation Actions
        run: |
          sleep 10
          $ANDROID_HOME/platform-tools/adb shell input swipe 500 1000 500 100 500
          sleep 2
          $ANDROID_HOME/platform-tools/adb shell input swipe 500 100 500 1000 500
          sleep 2
          $ANDROID_HOME/platform-tools/adb shell input keyevent 4
          sleep 2
          $ANDROID_HOME/platform-tools/adb shell input swipe 1000 500 100 500 500
          sleep 2

      - name: Take Screenshot
        run: |
          $ANDROID_HOME/platform-tools/adb shell screencap -p /sdcard/screenshot.png

      - name: Stop Screen Recording
        run: |
          $ANDROID_HOME/platform-tools/adb shell kill $RECORD_PID || true
          $ANDROID_HOME/platform-tools/adb pull /sdcard/emulator_record.mp4 . || echo "Failed to pull emulator_record.mp4"
          $ANDROID_HOME/platform-tools/adb pull /sdcard/screenshot.png . || echo "Failed to pull screenshot.png"

      - name: Stop Emulator
        run: |
          $ANDROID_HOME/platform-tools/adb emu kill

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Emulator-Outputs
          path: |
            emulator_record.mp4
            screenshot.png
