name: Android Emulator CI (Ubuntu with KVM)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  emulator-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2. تثبيت JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. تثبيت Android SDK
      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      # 4. تفعيل صلاحيات KVM للتسريع العتادي
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm || true

      # 5. تشغيل المحاكي وتنفيذ أوامر داخله
      - name: Launch emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          cores: 4
          avd-name: test
          force-avd-creation: true
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: "-no-window -gpu swiftshader_indirect"
          script: |
            adb wait-for-device
            adb shell input keyevent 82
            sleep 20
            adb exec-out screencap -p > screenshot.png

      # 6. حفظ الصورة كـ Artifact
      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshot
          path: screenshot.png
