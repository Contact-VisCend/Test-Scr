name: Android Emulator Screenshot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  emulator-screenshot:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2. تثبيت JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. تثبيت Android SDK
      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      # 4. تشغيل المحاكي وتنفيذ أوامر داخله
      - name: Launch emulator and take screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: "-no-window -gpu swiftshader_indirect -no-snapshot"
          script: |
            # انتظر قليلاً حتى يجهز المحاكي
            adb wait-for-device
            adb shell input keyevent 82
            # التقط صورة شاشة
            adb exec-out screencap -p > screenshot.png

      # 5. حفظ الصورة كـ Artifact
      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshot
          path: screenshot.png
