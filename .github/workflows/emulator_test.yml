name: Android Emulator CI with Random Device Profile

on:
  push:
    branches: [ "main" ] 
  pull_request: 
    branches: [ "main" ] 
  workflow_dispatch: 

jobs:  
  emulator-video:
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up JDK 17 
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK 
        uses: android-actions/setup-android@v3

      - name: Pick random supported device
        id: pick-device
        run: |
          devices=("pixel" "pixel_2" "pixel_2_xl" "pixel_3" "pixel_3_xl" "pixel_3a" "pixel_4" "pixel_4_xl" "pixel_5" "pixel_6" "pixel_6_pro" "pixel_7" "pixel_7_pro" "nexus_5x" "nexus_6p")
          random_device=${devices[$RANDOM % ${#devices[@]}]}
          echo "device=$random_device" >> $GITHUB_OUTPUT
          echo "Selected device: $random_device"

      - name: Enable KVM group perms
        run: | 
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm || true

      - name: Launch emulator and run script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: "pixel"
          avd-name: test
          force-avd-creation: true
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: "-no-window -gpu swiftshader_indirect"
          script: |
            adb wait-for-device
            # adb shell getprop ro.product.model
            # adb shell getprop ro.product.device
            # adb shell getprop ro.product.brand
            # adb shell setprop ro.product.model "Pixel 6"
            # adb shell setprop ro.product.device "pixel_6"
           
            # sleep 5
           
            # بدء تسجيل الفيديو لمدة 120 ثانية (يغلق تلقائيًا)
            # adb shell screenrecord --time-limit 120 /sdcard/demo.mp4 &
           
            
            # adb shell am start -n com.google.android.youtube/com.google.android.youtube.HomeActivity
            # sleep 5
            # adb exec-out screencap -p > screenshot_utube.png
            # فتح كروم
            # adb shell monkey -p com.google.android.webview -c android.intent.category.LAUNCHER 1
            # adb shell monkey -p com.android.htmlviewer -c android.intent.category.LAUNCHER 1
            adb shell am start -a android.intent.action.VIEW -d "https://viscend.vercel.app/" com.android.chrome



            sleep 10
           
            adb exec-out screencap -p > screenshot_accept.png
            # قبول الشروط
            adb shell input tap 543 1704
            adb shell input tap 543 1754
            adb shell input tap 543 1654
            adb shell input tap 543 1840
            # adb shell input tap 543 2121
            # adb shell input tap 543 2150
            # adb shell input tap 543 2250
            # adb shell input tap 543 2350
            # adb shell input tap 543 1900
            # adb shell input tap 543 1950
            sleep 5
           
            # نقرة احترازية
            adb shell input tap 330 1446
            sleep 5
            adb exec-out screencap -p > screenshot_confirm.png
           
            # نقرة إضافية
            # adb shell input tap 132 1625
            adb shell input tap 132 1665
            adb shell input tap 145 1695
            adb shell input tap 155 1720
            adb shell input tap 132 1700
            # adb shell input tap 132 1825
            # adb shell input tap 132 1855
            # adb shell input tap 132 1895
            # adb shell input tap 132 1925
            # adb shell input tap 132 1995
            # adb shell input tap 132 2025
            # adb shell input tap 132 2055
            # adb shell input tap 132 2188
            # adb shell input tap 132 2150
            # adb shell input tap 132 2125
            # adb shell input tap 132 2225
            sleep 5
            adb exec-out screencap -p > screenshot_extra.png
           
            # فتح الموقع
            # فتح كروم بوضع سطح المكتب + User-Agent مخصص
            adb shell am start -a android.intent.action.VIEW -d "https://www.effectivegatecpm.com/hvaux3ibr?key=06567318b4c1f8b6e102908f6def499a" com.android.chrome
            sleep 5


            sleep 15
            adb exec-out screencap -p > screenshot_open.png
           
            # adb shell am start -n com.android.htmlviewer/com.android.htmlviewer.HTMLViewerActivity -d "https://rescend.netlify.app/"
            sleep 5
            # تمرير 6 مرات مع صور بعد كل تمريرتين
            adb shell input swipe 500 1500 500 200
            sleep 3
            adb shell input swipe 500 1500 500 200
            adb exec-out screencap -p > screenshot_scroll2.png
            sleep 3
           
            adb shell input tap 543 1600
            adb shell input swipe 500 1500 500 200
            sleep 3
            adb shell input tap 543 1600
            adb shell input swipe 500 1500 500 200
            sleep 3
            adb shell input tap 543 1600
