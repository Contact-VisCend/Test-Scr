name: Android Emulator Test with Screenshot
on: [push]
jobs:
  test:
    runs-on: ubuntu-20.04  # تغيير بيئة التشغيل إلى Ubuntu 20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Xvfb and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libpulse0 libgl1-mesa-dri

      - name: Install Android System Image and Tools
        run: |
          echo "y" | sdkmanager --verbose "system-images;android-30;google_apis;x86" > /dev/null
          echo "y" | sdkmanager --verbose "emulator" > /dev/null
          echo "y" | sdkmanager --verbose "platform-tools" > /dev/null

      - name: Create AVD and Start Emulator
        run: |
          Xvfb :99 -screen 0 800x600x16 &
          export DISPLAY=:99
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-30;google_apis;x86" -d pixel_5 --force
          $ANDROID_HOME/emulator/emulator -avd test_device -no-window -no-snapshot -writable-system -partition-size 2048 -memory 2048 -noaudio -no-snapstorage -accel off -gpu swiftshader_indirect -no-boot-anim &
          $ANDROID_HOME/platform-tools/adb wait-for-device
          sleep 600  # زيادة وقت الانتظار إلى 10 دقائق

      - name: Check Boot Status
        run: |
          timeout 600 bash -c '
          until [[ "$($ANDROID_HOME/platform-tools/adb shell getprop init.svc.bootanim)" == "stopped" ]]; do
            sleep 10
          done
          '

      - name: Enable Root and Remount
        run: |
          $ANDROID_HOME/platform-tools/adb root
          sleep 10
          $ANDROID_HOME/platform-tools/adb remount
          sleep 10

      - name: Create Screenshot Directory
        run: |
          $ANDROID_HOME/platform-tools/adb shell mkdir -p /data/local/tmp

      - name: Take Screenshot
        run: |
          $ANDROID_HOME/platform-tools/adb shell screencap -p /data/local/tmp/screenshot.png
          $ANDROID_HOME/platform-tools/adb pull /data/local/tmp/screenshot.png .

      - name: Stop Emulator
        run: |
          $ANDROID_HOME/platform-tools/adb emu kill

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Emulator-Screenshot
          path: screenshot.png
